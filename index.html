<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYTO Hosting - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0F172A',
                        darker: '#020617',
                        primary: '#3B82F6',
                        success: '#10B981',
                        danger: '#EF4444',
                        warning: '#F59E0B',
                        card: '#1E293B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card-shadow {
                box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-darker to-dark min-h-screen flex items-center justify-center font-sans">
    <div class="w-full max-w-md px-4">
        <div class="bg-card rounded-2xl p-8 card-shadow border border-gray-700/30">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary/20 text-primary rounded-xl flex items-center justify-center mx-auto mb-4">
                    <i class="fa fa-rocket text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-primary to-blue-400 bg-clip-text text-transparent">XYTO Hosting</h1>
                <p class="text-gray-400 mt-2">Sign in to manage your bots</p>
            </div>

            <div id="alert" class="hidden bg-warning/10 border border-warning/30 text-warning p-3 rounded-lg mb-4 text-sm">
                Please login first.
            </div>

            <form id="loginForm" class="space-y-5">
                <div>
                    <label class="block text-gray-300 mb-2 text-sm font-medium">Username</label>
                    <div class="relative">
                        <i class="fa fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="text" id="username" placeholder="Enter your username" 
                            class="w-full bg-dark/50 border border-gray-700/50 rounded-lg py-3 px-10 text-gray-200 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-300 mb-2 text-sm font-medium">Password</label>
                    <div class="relative">
                        <i class="fa fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <input type="password" id="password" placeholder="Enter your password" 
                            class="w-full bg-dark/50 border border-gray-700/50 rounded-lg py-3 px-10 text-gray-200 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all">
                    </div>
                </div>

                <button type="submit" class="w-full bg-primary hover:bg-primary/90 py-3 rounded-lg font-medium transition-all flex items-center justify-center gap-2">
                    <i class="fa fa-sign-in"></i> Sign In
                </button>

                <p class="text-center text-gray-400 text-sm mt-4">
                    Don't have an account? <a href="#" class="text-primary hover:underline">Create one</a>
                </p>

                <div class="flex justify-center gap-6 mt-6 text-gray-400">
                    <div class="text-center">
                        <i class="fa fa-bolt text-xl mb-1"></i>
                        <p class="text-xs">Instant Deploy</p>
                    </div>
                    <div class="text-center">
                        <i class="fa fa-list text-xl mb-1"></i>
                        <p class="text-xs">Live Logs</p>
                    </div>
                    <div class="text-center">
                        <i class="fa fa-folder-open text-xl mb-1"></i>
                        <p class="text-xs">File Manager</p>
                    </div>
                </div>

                <!-- JOIN CHANNEL LINK ADDED HERE -->
                <div class="mt-6 text-center">
                    <a href="https://t.me/XytoChannel" target="_blank" class="inline-flex items-center gap-2 bg-blue-500/10 hover:bg-blue-500/20 text-blue-400 px-4 py-2 rounded-lg transition-all text-sm font-medium">
                        <i class="fa fa-paper-plane"></i> Join XYTO Channel
                    </a>
                </div>

                <p class="text-center text-gray-500 text-xs mt-4">Powered by XYTO Hosting</p>
            </form>
        </div>
    </div>

    <script>
        const adminUser = {
            username: "admin",
            password: "admin123",
            role: "Administrator",
            email: "admin@xytohost.com"
        };

        if(localStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const alertBox = document.getElementById('alert');

            if(username === adminUser.username && password === adminUser.password) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUser', JSON.stringify(adminUser));
                window.location.href = 'dashboard.html';
            } else {
                alertBox.classList.remove('hidden');
                setTimeout(() => alertBox.classList.add('hidden'), 3000);
            }
        });
    </script>
</body>
</html>
