<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYTO Hosting - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#0F172A',
                        darker: '#020617',
                        primary: '#3B82F6',
                        success: '#10B981',
                        danger: '#EF4444',
                        warning: '#F59E0B',
                        card: '#1E293B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card-shadow {
                box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            }
            .scrollbar-hide {
                -ms-overflow-style: none;
                scrollbar-width: none;
            }
            .scrollbar-hide::-webkit-scrollbar {
                display: none;
            }
            .modal-backdrop {
                backdrop-filter: blur(4px);
            }
        }
    </style>
</head>
<body class="bg-darker text-gray-100 min-h-screen font-sans">
    <script>
        if(localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'index.html';
        }
        
        const currentUser = JSON.parse(localStorage.getItem('currentUser')) || {};

        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }

        // Modal functions
        function openCreateBot() {
            document.getElementById('createBotModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeCreateBot() {
            document.getElementById('createBotModal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }
    </script>

    <!-- Header -->
    <header class="bg-dark/80 backdrop-blur-md border-b border-gray-700/50 px-6 py-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <i class="fa fa-rocket text-primary text-2xl"></i>
                <h1 class="text-xl font-bold bg-gradient-to-r from-primary to-blue-400 bg-clip-text text-transparent">XYTO Hosting</h1>
            </div>
            <div class="flex gap-4 items-center">
                <a href="https://t.me/XytoChannel" target="_blank" class="hidden md:inline-flex items-center gap-2 bg-blue-500/10 hover:bg-blue-500/20 text-blue-400 px-3 py-1 rounded-lg transition-all text-xs">
                    <i class="fa fa-paper-plane"></i> Join Channel
                </a>
                
                <div class="text-right hidden md:block">
                    <p class="text-sm font-medium">Welcome, <script>document.write(currentUser.username || 'Admin')</script></p>
                    <p class="text-xs text-gray-400"><script>document.write(currentUser.role || 'Administrator')</script></p>
                </div>
                <button onclick="logout()" class="bg-danger/20 hover:bg-danger/30 text-danger px-3 py-1 rounded-lg text-sm transition-all">
                    <i class="fa fa-sign-out"></i> Logout
                </button>
                <button onclick="openCreateBot()" class="bg-primary hover:bg-primary/90 px-4 py-2 rounded-lg font-medium transition-all flex items-center gap-2">
                    <i class="fa fa-plus"></i> New Bot
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <!-- Stats Row -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-card rounded-xl p-5 card-shadow border border-gray-700/30">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-gray-400 text-sm">Bots Used</p>
                        <h3 class="text-3xl font-bold mt-1">0/10</h3>
                    </div>
                    <div class="w-10 h-10 bg-primary/20 text-primary rounded-lg flex items-center justify-center">
                        <i class="fa fa-cogs"></i>
                    </div>
                </div>
            </div>

            <div class="bg-card rounded-xl p-5 card-shadow border border-gray-700/30">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-gray-400 text-sm">Running</p>
                        <h3 class="text-3xl font-bold mt-1 text-success">0</h3>
                    </div>
                    <div class="w-10 h-10 bg-success/20 text-success rounded-lg flex items-center justify-center">
                        <i class="fa fa-play"></i>
                    </div>
                </div>
            </div>

            <div class="bg-card rounded-xl p-5 card-shadow border border-gray-700/30">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-gray-400 text-sm">Stopped</p>
                        <h3 class="text-3xl font-bold mt-1 text-danger">0</h3>
                    </div>
                    <div class="w-10 h-10 bg-danger/20 text-danger rounded-lg flex items-center justify-center">
                        <i class="fa fa-stop"></i>
                    </div>
                </div>
            </div>

            <div class="bg-card rounded-xl p-5 card-shadow border border-gray-700/30">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-gray-400 text-sm">Storage</p>
                        <h3 class="text-lg font-bold mt-1">0 MB <span class="text-xs text-gray-400">/ 2.5 GB</span></h3>
                    </div>
                    <div class="w-10 h-10 bg-warning/20 text-warning rounded-lg flex items-center justify-center">
                        <i class="fa fa-hdd-o"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Your Bots Section -->
        <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
            <i class="fa fa-robot text-primary"></i> Your Bots
        </h2>

        <div class="bg-card rounded-xl p-10 card-shadow border border-gray-700/30 text-center">
            <div class="text-gray-500 mb-4">
                <i class="fa fa-robot text-6xl opacity-30"></i>
            </div>
            <h3 class="text-xl font-medium text-gray-300 mb-2">No Bots Created Yet</h3>
            <p class="text-gray-400 mb-6">Click the "New Bot" button above to create your first bot hosting</p>
            <button onclick="openCreateBot()" class="bg-primary hover:bg-primary/90 px-6 py-3 rounded-lg font-medium transition-all inline-flex items-center gap-2">
                <i class="fa fa-plus"></i> Create New Bot
            </button>
            
            <div class="mt-8">
                <a href="https://t.me/XytoChannel" target="_blank" class="inline-flex items-center gap-2 bg-blue-500/10 hover:bg-blue-500/20 text-blue-400 px-4 py-2 rounded-lg transition-all text-sm font-medium">
                    <i class="fa fa-paper-plane"></i> Join XYTO Official Channel
                </a>
            </div>
        </div>

    </main>

    <!-- 🆕 CREATE NEW BOT MODAL / POPUP -->
    <div id="createBotModal" class="hidden fixed inset-0 z-[999] modal-backdrop bg-black/60 flex items-center justify-center p-4">
        <div class="bg-dark rounded-xl w-full max-w-3xl max-h-[90vh] overflow-y-auto card-shadow border border-gray-700/30">
            <!-- Modal Header -->
            <div class="p-5 border-b border-gray-700/50 flex justify-between items-center sticky top-0 bg-dark z-10">
                <div>
                    <h2 class="text-xl font-bold flex items-center gap-2">
                        <i class="fa fa-plus-circle text-primary"></i> Create New Bot
                    </h2>
                    <p class="text-sm text-gray-400">Deploy your Telegram bot in seconds</p>
                </div>
                <button onclick="closeCreateBot()" class="text-gray-400 hover:text-white text-xl transition-colors">
                    <i class="fa fa-times"></i>
                </button>
            </div>

            <!-- Modal Content -->
            <div class="p-6 space-y-8">
                <!-- Step 1: Choose Library -->
                <div
